{% extends 'base.html' %}

{% block title %}Log in | BountyBoard{% endblock %}

{% block content %}
<section class="mx-auto max-w-md">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-900">Log in</h1>
        <p class="mt-1 text-sm text-slate-500">Access posting, claiming, and reputation features.</p>

        <form class="mt-6 space-y-5" method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="rounded-xl bg-red-50 px-4 py-3 text-sm font-medium text-red-700">{{ form.non_field_errors }}</div>
            {% endif %}
            <div>
                <label class="mb-2 block text-sm font-bold text-slate-900" for="{{ form.username.id_for_label }}">Username</label>
                <input class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-indigo-100" type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" required>
            </div>
            <div>
                <label class="mb-2 block text-sm font-bold text-slate-900" for="{{ form.password.id_for_label }}">Password</label>
                <input class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-indigo-100" type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" required>
            </div>
            <button class="w-full rounded-xl bg-brand px-5 py-3 text-sm font-bold text-white hover:bg-indigo-700" type="submit">Log in</button>
        </form>
    </div>
</section>
{% endblock %}
