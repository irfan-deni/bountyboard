{% extends 'base.html' %}

{% block title %}Log In — BountyBoard{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-4">Log In</h2>

<div class="bg-white rounded-2xl p-6 shadow-[0_8px_24px_rgba(0,0,0,0.08)] max-w-sm">
    <form method="post">
        {% csrf_token %}

        <div class="mb-4">
            <label for="id_username" class="block font-semibold text-sm mb-1.5">Username</label>
            <input type="text" name="username" id="id_username" required
                   class="w-full rounded-xl border border-stone-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
        </div>

        <div class="mb-4">
            <label for="id_password" class="block font-semibold text-sm mb-1.5">Password</label>
            <input type="password" name="password" id="id_password" required
                   class="w-full rounded-xl border border-stone-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
        </div>

        {% if form.errors %}
            <p class="text-red-600 text-sm mb-3">Invalid username or password.</p>
        {% endif %}

        <button type="submit" class="w-full bg-emerald-700 text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-emerald-800 cursor-pointer">Log In</button>
    </form>
</div>
{% endblock %}
