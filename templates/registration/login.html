{% extends 'base.html' %}

{% block title %}Log In | BountyBoard{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center -my-12">
    <div class="pixel-panel p-8 max-w-sm w-full">
        <h2 class="font-display text-2xl tracking-tight text-ink mb-5">Log In</h2>
        <form method="post">
            {% csrf_token %}

            <div class="mb-5">
                <label for="id_username" class="pixel-label">Username</label>
                <input type="text" name="username" id="id_username" required
                       class="pixel-input">
            </div>

            <div class="mb-5">
                <label for="id_password" class="pixel-label">Password</label>
                <input type="password" name="password" id="id_password" required
                       class="pixel-input">
            </div>

            {% if form.errors %}
                <p class="text-semantic-error text-sm mb-4 font-medium">Invalid username or password.</p>
            {% endif %}

            <button type="submit" class="pixel-button w-full">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
