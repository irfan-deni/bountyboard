{% extends 'base.html' %}

{% block title %}Log In | BountyBoard{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center -my-12">
    <div class="rounded-lg border border-hairline bg-surface-card p-8 max-w-sm w-full">
        <h2 class="text-2xl font-normal tracking-tight text-ink mb-5">Log In</h2>
        <form method="post">
            {% csrf_token %}

            <div class="mb-5">
                <label for="id_username" class="block font-semibold text-sm mb-2 text-ink">Username</label>
                <input type="text" name="username" id="id_username" required
                       class="w-full rounded-md border border-hairline bg-surface-card px-4 py-3 text-sm text-ink focus:border-primary focus:outline-none">
            </div>

            <div class="mb-5">
                <label for="id_password" class="block font-semibold text-sm mb-2 text-ink">Password</label>
                <input type="password" name="password" id="id_password" required
                       class="w-full rounded-md border border-hairline bg-surface-card px-4 py-3 text-sm text-ink focus:border-primary focus:outline-none">
            </div>

            {% if form.errors %}
                <p class="text-semantic-error text-sm mb-4 font-medium">Invalid username or password.</p>
            {% endif %}

            <button type="submit" class="w-full rounded-md bg-primary px-5 py-3 text-sm font-medium text-on-primary hover:bg-primary-active cursor-pointer">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
