<article class="group relative flex h-full flex-col rounded-xl border border-slate-200 bg-white p-5 shadow-sm transition-shadow hover:shadow-md">
    <div class="mb-3 flex items-start justify-between gap-3">
        <span class="rounded bg-indigo-50 px-2.5 py-1 text-xs font-bold uppercase tracking-wide text-brand">{{ task.get_category_display }}</span>
        <span class="whitespace-nowrap text-lg font-extrabold text-bounty">RM {{ task.bounty }}</span>
    </div>

    <h3 class="mb-2 text-lg font-bold leading-tight text-slate-900">{{ task.title }}</h3>
    <p class="mb-6 line-clamp-2 text-sm leading-6 text-slate-500">{{ task.description }}</p>

    <div class="mt-auto flex items-center justify-between border-t border-slate-100 pt-4">
        <div class="flex flex-col text-xs">
            <span class="font-semibold {% if task.status == 'open' %}text-red-500{% else %}text-slate-500{% endif %}">Due: {{ task.deadline|date:"M d, g:i A" }}</span>
            <span class="mt-0.5 text-slate-400">By: @{{ task.poster.username }}</span>
        </div>
        <a href="{% url 'task_detail' task.id %}" class="rounded-lg bg-slate-100 px-4 py-2 text-sm font-medium text-slate-700 transition-colors hover:bg-bounty hover:text-white">View & Claim</a>
    </div>
</article>
