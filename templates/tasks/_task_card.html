<article class="flex h-full flex-col rounded-lg border border-hairline bg-canvas p-6">
    <div class="mb-3 flex items-start justify-between gap-3">
        <span class="bg-surface-pearl text-ink-muted-80 px-3 py-1 text-xs font-semibold tracking-tight">{{ task.get_category_display }}</span>
        <span class="whitespace-nowrap text-lg font-semibold text-ink">RM {{ task.bounty }}</span>
    </div>

    <h3 class="mb-2 text-lg font-semibold leading-tight text-ink">{{ task.title }}</h3>
    <p class="mb-6 line-clamp-2 text-sm leading-relaxed text-ink-muted-80">{{ task.description }}</p>

    <div class="mt-auto flex items-center justify-between pt-4">
        <div class="flex flex-col text-xs">
            <span class="font-medium text-ink-muted-48">Due: {{ task.deadline|date:"M d, g:i A" }}</span>
            <span class="mt-0.5 text-ink-muted-48">By: @{{ task.poster.username }}</span>
        </div>
        <a href="{% url 'task_detail' task.id %}" class="rounded-full bg-primary px-5 py-1.5 text-sm font-medium text-on-primary no-underline hover:bg-primary-focus">View</a>
    </div>
</article>
