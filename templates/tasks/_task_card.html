<article class="pixel-panel-sm flex h-full flex-col p-5">
    <div class="mb-3 flex items-start justify-between gap-3">
        <span class="border-4 border-ink bg-surface-strong px-2.5 py-1 text-xs font-bold uppercase tracking-widest text-ink">{{ task.get_category_display }}</span>
        <span class="whitespace-nowrap border-4 border-ink bg-primary px-3 py-1 text-lg font-bold text-ink">RM {{ task.bounty }}</span>
    </div>

    <h3 class="mb-2 text-xl font-bold leading-tight text-ink">{{ task.title }}</h3>
    <p class="mb-6 line-clamp-2 text-base leading-relaxed text-body">{{ task.description }}</p>

    <div class="mt-auto flex items-center justify-between gap-4 border-t-4 border-ink pt-4">
        <div class="flex flex-col text-sm">
            <span class="font-bold text-muted">Due: {{ task.deadline|date:"M d, g:i A" }}</span>
            <span class="mt-0.5 text-muted">By: @{{ task.poster.username }}</span>
        </div>
        <a href="{% url 'task_detail' task.id %}" class="pixel-button px-4 py-2">View</a>
    </div>
</article>
