<article class="flex h-full flex-col rounded-lg border border-hairline bg-surface-card p-6">
    <div class="mb-3 flex items-start justify-between gap-3">
        <span class="bg-surface-strong text-ink px-2.5 py-1 text-xs font-semibold uppercase tracking-widest">{{ task.get_category_display }}</span>
        <span class="whitespace-nowrap text-lg font-semibold text-ink">RM {{ task.bounty }}</span>
    </div>

    <h3 class="mb-2 text-lg font-semibold leading-tight text-ink">{{ task.title }}</h3>
    <p class="mb-6 line-clamp-2 text-sm leading-relaxed text-body">{{ task.description }}</p>

    <div class="mt-auto flex items-center justify-between pt-4 border-t border-hairline-soft">
        <div class="flex flex-col text-xs">
            <span class="font-medium text-muted">Due: {{ task.deadline|date:"M d, g:i A" }}</span>
            <span class="mt-0.5 text-muted">By: <a href="{% url 'user_profile' username=task.poster.username %}" class="text-muted no-underline hover:text-primary">@{{ task.poster.username }}</a></span>
        </div>
        <a href="{% url 'task_detail' task.id %}" class="rounded-md bg-primary px-5 py-2 text-sm font-medium text-on-primary no-underline hover:bg-primary-active">View</a>
    </div>
</article>
