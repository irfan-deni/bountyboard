{% extends 'base.html' %}

{% block title %}Post a Bounty — BountyBoard{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-4">Post a Bounty</h2>

<div class="bg-white rounded-2xl p-6 shadow-[0_8px_24px_rgba(0,0,0,0.08)] max-w-xl">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="bg-emerald-700 text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-emerald-800 cursor-pointer">Post Bounty</button>
    </form>
</div>
{% endblock %}
