services:
  web:
    build:
      context: .
      network: host
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
      - sqlite_data:/app/data
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      SQLITE_PATH: "/app/data/db.sqlite3"

volumes:
  sqlite_data:
